name: qintopia-weather
label: Qintopia Weather
kind: standalone
version: 0.1.0
description: >
  Fixed-location Qintopia weather lookup capability. This package is the future
  extraction target for qintopia_weather_lookup.
provides_tools:
  - qintopia_weather_lookup
optional_env:
  - name: QINTOPIA_WEATHER_LOCATION
    description: "Fixed Qintopia lon,lat coordinates; defaults to 108.5876,33.9996"
    password: false
  - name: QINTOPIA_WEATHER_LOCATION_NAME
    description: "Member-facing fixed location name; defaults to 秦托邦"
    password: false
  - name: QINTOPIA_WEATHER_QWEATHER_CITY
    description: "QWeather city for alert and air-quality APIs; defaults to 鄠邑区"
    password: false
  - name: HEFENG_PROJECT_ID
    description: "QWeather JWT project id"
    password: false
  - name: HEFENG_KEY_ID
    description: "QWeather JWT credential id"
    password: false
  - name: HEFENG_PRIVATE_KEY_PATH
    description: "Runtime path to QWeather Ed25519 private key"
    password: false
