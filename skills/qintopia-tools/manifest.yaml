  WenYuanGe/Dify read wrappers, message-store search, complaint intake, Xiaoman activity
  helpers, and controlled business wrappers.
source:
  path: /home/ubuntu/.hermes/profiles/*/plugins/qintopia-tools
  reference: server-runtime-2026-07-05
  disposition: adopt
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: true
  secrets: true
validation:
  commands:
    - pnpm skills:qintopia-tools:check
    - pnpm check:light
dependencies:
  - agents/erhua
  - agents/xiaoman
  - agents/wenyuange
  - runtime/hermes
  - mcp/context-server
tags:
  - hermes-plugin
  - qintopia
  - knowledge
  - profile-variant
next_actions:
