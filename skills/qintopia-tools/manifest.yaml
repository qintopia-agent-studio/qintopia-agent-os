id: skills/qintopia-tools
type: skill
name: Qintopia Tools
owner: PatrickLiveCool
status: adopting
risk_level: medium
description:
  Profile-scoped Hermes registration shell and remaining broad Qintopia tools for GIS
  lookup, message-store search, complaint intake, Xiaoman activity helpers, and
  controlled business wrappers. Weather and WenYuanGe/Dify retrieval behavior now live
  in dedicated capability packages.
source:
  path: /home/ubuntu/.hermes/profiles/*/plugins/qintopia-tools
  reference: server-runtime-2026-07-05
  disposition: adopt
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: true
  secrets: true
validation:
  commands:
    - pnpm skills:qintopia-tools:check
    - pnpm check:light
dependencies:
  - agents/erhua
  - agents/xiaoman
  - agents/wenyuange
  - runtime/hermes
  - mcp/context-server
  - skills/qintopia-weather
  - skills/knowledge-retrieval
tags:
  - hermes-plugin
  - qintopia
  - knowledge
  - profile-variant
next_actions:
  - Reconcile the Erhua, Xiaoman, and Wenyuange variants into a shared package plus
    explicit profile overlays.
  - Keep weather behavior in skills/qintopia-weather; qintopia-tools should only expose
    the legacy Hermes registration shell for qintopia_weather_lookup.
  - Keep WenYuanGe/Dify retrieval behavior in skills/knowledge-retrieval; qintopia-tools
    should only expose stable Hermes tool registration for those tool names.
  - Keep Xiaoqin out of active migration scope.
  - Add release packaging and rollback notes before replacing profile-local plugin
    directories on the server.
