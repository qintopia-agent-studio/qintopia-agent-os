id: deploy/smoke
type: deploy
name: Cross-Domain Smoke Checks
owner: PatrickLiveCool
status: draft
risk_level: medium
description:
  Common smoke-check boundary for release manifests, profile bundles, MCP commands, and
  worker availability.
source:
  path: deploy/smoke
  reference: monorepo-release-model
  disposition: template
production_boundary:
  external_sends: false
  database_writes: false
  runtime_profile: true
  secrets: true
validation:
  commands:
    - pnpm deploy:smoke:check
    - pnpm check:light
dependencies:
  - deploy/manifests
  - runtime/hermes
  - runtime/sidecar
tags:
  - deploy
  - smoke
  - validation
next_actions:
  - Run the Huabaosi WeCom gateway observation smoke from release/current after the
    phase-2 PR is deployed, and record only sanitized counts and pass/fail evidence.
  - Keep the Xiaoman production preflight on Hold until the corrected observation
    contract is released and the aggregate smoke passes with sanitized evidence.
  - Wrap existing sidecar smoke scripts under this package without changing behavior.
