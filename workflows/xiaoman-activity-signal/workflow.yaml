id: workflows/xiaoman-activity-signal
type: workflow
name: Xiaoman Activity Signal
owner: PatrickLiveCool
status: active
risk_level: medium
description:
  Xiaoman workflow for phase-aware activity signal intake, audited Postgres
  status/gap/phase mutation, and fixed internal request routing.
source:
  path: runtime/sidecar/src/xiaoman_activity.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - runtime/sidecar
  - runtime/postgres
  - workflows/activity-promotion
tags:
  - workflow
  - xiaoman
  - activity
  - signal
next_actions:
  - The AgentOS-only Xiaoman activity signal path is production-ready. Keep external
    sends, image generation, Feishu writeback, and publication disabled until their
    separately reviewed production gates are satisfied.
  - Re-run the aggregate Xiaoman production preflight smoke after each owner-approved
    deploy and record the observed queue counts and any blocking point.
  - Keep Feishu writes behind reviewed adapters and do not make Feishu the source of
    truth.
