id: workflows/xiaoman-activity-signal
type: workflow
name: Xiaoman Activity Signal
owner: PatrickLiveCool
status: active
risk_level: medium
description:
  Xiaoman workflow for activity signal intake, activity state updates, and downstream
  request triggering.
source:
  path: runtime/sidecar/src/xiaoman_activity.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - runtime/sidecar
  - runtime/postgres
  - workflows/activity-promotion
tags:
  - workflow
  - xiaoman
  - activity
  - signal
next_actions:
  - Run the aggregate Xiaoman production preflight smoke after an owner-approved deploy
    and record the observed queue counts and any blocking point.
  - Add real evidence retrieval and visual generation only after the internal artifact
    timers are stable and owner-reviewed.
  - Keep Feishu writes behind reviewed adapters and do not make Feishu the source of
    truth.
