id: workflows/xiaoman-activity-signal
type: workflow
name: Xiaoman Activity Signal
owner: PatrickLiveCool
status: draft
risk_level: medium
description:
  Xiaoman workflow for activity signal intake, activity state updates, and downstream
  request triggering.
source:
  path: runtime/sidecar/src/xiaoman_activity.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - runtime/sidecar
  - runtime/postgres
  - workflows/activity-promotion
tags:
  - workflow
  - xiaoman
  - activity
  - signal
next_actions:
  - Run the guarded Xiaoman activity signal timer observation smoke after an
    owner-approved deploy, then record whether runtime intake is healthy.
  - Run the guarded Xiaoman activity promotion starter timer observation smoke after an
    owner-approved deploy, then record whether child work item intake is healthy.
  - Run the guarded Xiaoman downstream observation smoke after an owner-approved deploy
    to confirm evidence and visual worker previews are safe before adding any runtime
    scheduling.
  - Add downstream evidence and visual worker runtime scheduling only after production
    observation confirms this AgentOS-only path is stable.
  - Keep Feishu writes behind reviewed adapters and do not make Feishu the source of
    truth.
