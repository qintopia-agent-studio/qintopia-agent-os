id: workflows/xiaoman-activity-signal
type: workflow
name: Xiaoman Activity Signal
owner: PatrickLiveCool
status: active
risk_level: medium
description:
  Xiaoman workflow for activity signal intake, audited Postgres status/gap mutation, and
  downstream request triggering.
source:
  path: runtime/sidecar/src/xiaoman_activity.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - runtime/sidecar
  - runtime/postgres
  - workflows/activity-promotion
tags:
  - workflow
  - xiaoman
  - activity
  - signal
next_actions:
  - Observe audited event-signal status/gap mutations only after the migration is
    deployed; keep Feishu writeback disabled.
  - Observe source-grounded Postgres evidence retrieval against the disposable apply
    smoke before the next owner-approved production release.
  - Re-run the aggregate Xiaoman production preflight smoke after each owner-approved
    deploy and record the observed queue counts and any blocking point.
  - Observe the image-generation starter timer separately from the disabled image
    provider worker; only run real generation through an owner-approved staging gate.
  - Require the Huabaosi production disabled-state observation to prove the provider
    worker remains off and unscheduled after internal-runtime deployments.
  - Keep Feishu writes behind reviewed adapters and do not make Feishu the source of
    truth.
