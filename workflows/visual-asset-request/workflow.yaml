id: workflows/visual-asset-request
type: workflow
name: Visual Asset Request
owner: PatrickLiveCool
status: draft
risk_level: medium
description:
  Workflow for Xiaoman-to-Huabaosi visual asset requests, draft evidence, human review,
  and delivery state.
source:
  path: runtime/sidecar/src/operations.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - agents/huabaosi
  - workflows/activity-promotion
  - runtime/sidecar
  - runtime/postgres
tags:
  - workflow
  - huabaosi
  - xiaoman
  - visual-assets
next_actions:
  - Add replay fixtures for request creation, draft evidence, human review, and
    delivery.
  - Keep publication and external sends outside this workflow until separately approved.
