id: workflows/visual-asset-request
type: workflow
name: Visual Asset Request
owner: PatrickLiveCool
status: active
risk_level: medium
description:
  Workflow for Xiaoman-to-Huabaosi visual briefs, human review, controlled
  image-generation request intake, and delivery state.
source:
  path: runtime/sidecar/src/operations.rs
  reference: current-monorepo
  disposition: template
production_boundary:
  external_sends: false
  database_writes: true
  runtime_profile: false
  secrets: true
validation:
  commands:
    - pnpm workflows:check
    - pnpm check:runtime
dependencies:
  - agents/xiaoman
  - agents/huabaosi
  - workflows/activity-promotion
  - runtime/sidecar
  - runtime/postgres
tags:
  - workflow
  - huabaosi
  - xiaoman
  - visual-assets
next_actions:
  - Keep the reviewed AgentOS internal brief path observable in the PostgreSQL apply
    smoke.
  - Implement a separately owner-reviewed provider, isolated media storage, and staged
    rollout before enabling any real image generation.
  - Keep publication and external sends outside this workflow until separately approved.
