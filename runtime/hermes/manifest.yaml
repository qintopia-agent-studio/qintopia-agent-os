id: runtime/hermes
type: runtime
name: Hermes Profile Bundle Runtime
owner: PatrickLiveCool
status: adopting
risk_level: high
description:
  Template and validation boundary for reviewed Hermes profile bundle inputs without
  copying live runtime state into git.
source:
  path: /home/ubuntu/.hermes/profiles
  reference: runtime-inventory-2026-07-06
  disposition: template
production_boundary:
  external_sends: false
  database_writes: false
  runtime_profile: true
  secrets: true
validation:
  commands:
    - pnpm agents:profile-bundles:check
    - pnpm runtime:hermes:check
    - pnpm check:light
dependencies:
  - agents/erhua
  - agents/xiaoman
  - agents/wenyuange
  - agents/silaoshi
  - agents/default
  - agents/guanerye
  - agents/huabaosi
tags:
  - hermes
  - profile-bundle
  - runtime-template
next_actions:
  - Deploy the observation-only Xiaoman bundle, run the owner-approved one-time values
    migration, and record production parity before any live profile repoint.
  - Add first-cutover backup and rollback behavior in a separate reviewed PR.
  - Keep `.env`, sessions, logs, cache, auth, and state databases out of git and release
    bundles.
  - Promote profile bundles only through reviewed release/current runbooks.
  - Keep docs/operations/review-pool/hermes patch evidence out of deploy bundles;
    migrate each accepted behavior into an owned package in an independent PR.
