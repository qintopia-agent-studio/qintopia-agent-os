name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  sidecar-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0

      - name: Build sidecar artifact
        run: node tools/deploy/build-sidecar-artifact.mjs

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: qintopia-message-sidecar-linux-x86_64-gnu
          path: dist/sidecar-artifacts/qintopia-message-sidecar-linux-x86_64-gnu
          retention-days: 14
          if-no-files-found: error
