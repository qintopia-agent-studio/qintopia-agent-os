name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.75.0"
  PNPM_VERSION: "10.29.2"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt

      - name: Cache sidecar cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime/sidecar -> target
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  sidecar-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0

      - name: Cache sidecar cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime/sidecar -> target
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build sidecar artifact
        run: node tools/deploy/build-sidecar-artifact.mjs

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: qintopia-message-sidecar-linux-x86_64-gnu
          path: dist/sidecar-artifacts/qintopia-message-sidecar-linux-x86_64-gnu
          retention-days: 14
          if-no-files-found: error
