name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.75.0"
  PNPM_VERSION: "10.29.2"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      full-check: ${{ steps.detect.outputs.full-check }}
      changed-files: ${{ steps.detect.outputs.changed-files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            mapfile -t changed < <(git show --name-only --pretty='' "$head_sha" | sed '/^$/d' | sort -u)
          else
            git fetch --no-tags --depth=1 origin "$base_sha" || true
            mapfile -t changed < <(git diff --name-only "$base_sha" "$head_sha" | sort -u)
          fi

          full_check=false
          for file in "${changed[@]}"; do
            case "$file" in
              *.md|docs/**|deploy/sidecar/docs/**)
                ;;
              *)
                full_check=true
                ;;
            esac
          done

          {
            echo "changed-files<<EOF"
            printf '%s\n' "${changed[@]}"
            echo "EOF"
            echo "full-check=${full_check}"
          } >> "$GITHUB_OUTPUT"

          printf 'full-check=%s\n' "$full_check"
          printf 'changed files:\n'
          printf '  %s\n' "${changed[@]}"

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Light check
        env:
          GITHUB_BASE_SHA:
            ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm check:light

      - name: Setup Python
        if: ${{ needs.changes.outputs.full-check == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        if: ${{ needs.changes.outputs.full-check == 'true' }}
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt

      - name: Runtime check
        if: ${{ needs.changes.outputs.full-check == 'true' }}
        run: pnpm check:runtime

      - name: Report docs-only check
        if: ${{ needs.changes.outputs.full-check != 'true' }}
        run: |
          echo "Docs-only or Markdown-only change detected."
          echo "Skipped Python/Rust runtime checks and artifact builds."
