name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.75.0"
  PNPM_VERSION: "10.29.2"
  TENCENT_COS_BUCKET:
    ${{ vars.TENCENT_COS_BUCKET || 'qintopia-agent-os-artifacts-1305166808' }}
  TENCENT_COS_REGION: ${{ vars.TENCENT_COS_REGION || 'ap-shanghai' }}
  TENCENT_COS_PREFIX: ${{ vars.TENCENT_COS_PREFIX || 'qintopia-agent-os' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  sidecar-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      actions: write
      contents: read

    env:
      TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
      TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75.0

      - name: Build sidecar artifact
        run: node tools/deploy/build-sidecar-artifact.mjs

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: qintopia-message-sidecar-linux-x86_64-gnu
          path: dist/sidecar-artifacts/qintopia-message-sidecar-linux-x86_64-gnu
          retention-days: 14
          if-no-files-found: error

      - name: Upload sidecar artifact to Tencent COS
        if: >-
          ${{ env.TENCENT_COS_SECRET_ID != '' && env.TENCENT_COS_SECRET_KEY != '' }}
        run: >-
          deploy/sidecar/scripts/upload-cos-artifact.sh --artifact-dir
          dist/sidecar-artifacts/qintopia-message-sidecar-linux-x86_64-gnu --sha
          "$GITHUB_SHA"
        env:
          TENCENT_COS_BUCKET: ${{ env.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ env.TENCENT_COS_REGION }}
          TENCENT_COS_SECRET_ID: ${{ env.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ env.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_PREFIX: ${{ env.TENCENT_COS_PREFIX }}

      - name: Prune old sidecar artifacts
        run: >-
          node tools/deploy/prune-github-artifacts.mjs --artifact-name
          qintopia-message-sidecar-linux-x86_64-gnu --keep 2
        env:
          GITHUB_TOKEN: ${{ github.token }}
