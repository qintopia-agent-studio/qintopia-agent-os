name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Approved master commit SHA to deploy.
        required: true
        type: string
      runtime_sha:
        description: Sidecar runtime artifact SHA. Defaults to commit_sha when equal.
        required: false
        type: string
      deploy_bundle_sha:
        description: Deploy bundle artifact SHA. Defaults to commit_sha when equal.
        required: false
        type: string
      release_sha:
        description: Immutable release SHA. Defaults to deploy_bundle_sha.
        required: false
        type: string
      release_scope:
        description:
          "Comma-separated scope: sidecar-runtime,deploy-bundle,hermes-plugins."
        required: true
        default: deploy-bundle,hermes-plugins
        type: string
      restart_targets:
        description: Comma-separated fixed restart targets.
        required: true
        default: qintopia-system-services
        type: string
      dry_run:
        description:
          Validate and assemble only; do not switch current or restart services.
        required: true
        default: true
        type: boolean
      rollback_on_smoke_failure:
        description: Roll back current if post-promotion smoke fails.
        required: true
        default: true
        type: boolean
      notes:
        description: Operator notes for the deploy request.
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.29.2"
  TENCENT_COS_BUCKET:
    ${{ vars.TENCENT_COS_BUCKET || 'qintopia-agent-os-artifacts-1305166808' }}
  TENCENT_COS_REGION: ${{ vars.TENCENT_COS_REGION || 'ap-shanghai' }}
  TENCENT_COS_PREFIX: ${{ vars.TENCENT_COS_PREFIX || 'qintopia-agent-os' }}
  TENCENT_COS_ENDPOINT: ${{ vars.TENCENT_COS_ENDPOINT || '' }}

jobs:
  request-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    permissions:
      contents: read

    env:
      TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
      TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deploy runner contracts
        run: pnpm deploy:runner:check

      - name: Validate target commit belongs to master
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin master
          git cat-file -e "${{ inputs.commit_sha }}^{commit}"
          git merge-base --is-ancestor "${{ inputs.commit_sha }}" origin/master

      - name: Validate Tencent COS upload configuration
        if: ${{ env.TENCENT_COS_SECRET_ID == '' || env.TENCENT_COS_SECRET_KEY == '' }}
        run: >-
          echo "TENCENT_COS_SECRET_ID and TENCENT_COS_SECRET_KEY are required in the
          production environment." >&2; exit 2

      - name: Create deploy request
        run: >-
          node tools/deploy/create-deploy-request.mjs --commit-sha "${{
          inputs.commit_sha }}" --runtime-sha "${{ inputs.runtime_sha ||
          inputs.commit_sha }}" --deploy-bundle-sha "${{ inputs.deploy_bundle_sha ||
          inputs.commit_sha }}" --release-sha "${{ inputs.release_sha ||
          inputs.deploy_bundle_sha || inputs.commit_sha }}" --release-scope "${{
          inputs.release_scope }}" --restart-targets "${{ inputs.restart_targets }}"
          --dry-run "${{ inputs.dry_run }}" --rollback-on-smoke-failure "${{
          inputs.rollback_on_smoke_failure }}" --requested-by "${{ github.actor }}"
          --notes "${{ inputs.notes }}" --output dist/deploy-requests/request.json
        env:
          TENCENT_COS_BUCKET: ${{ env.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ env.TENCENT_COS_REGION }}
          TENCENT_COS_PREFIX: ${{ env.TENCENT_COS_PREFIX }}

      - name: Upload deploy request to Tencent COS
        run:
          deploy/runner/upload-deploy-request.sh --request-file
          dist/deploy-requests/request.json
        env:
          TENCENT_COS_BUCKET: ${{ env.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ env.TENCENT_COS_REGION }}
          TENCENT_COS_SECRET_ID: ${{ env.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ env.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_PREFIX: ${{ env.TENCENT_COS_PREFIX }}
          TENCENT_COS_ENDPOINT: ${{ env.TENCENT_COS_ENDPOINT }}

      - name: Upload deploy request audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: qintopia-agent-os-deploy-request
          path: dist/deploy-requests/request.json
          retention-days: 30
          if-no-files-found: error
